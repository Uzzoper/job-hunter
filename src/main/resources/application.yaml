spring:
  application:
    name: job-hunter

  datasource:
    url: jdbc:postgresql://localhost:5433/jobhunter
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

ai:
  openrouter:
    base-url: https://openrouter.ai/api/v1
    api-key: ${OPENROUTER_API_KEY}
    model: minimax/minimax-m2.5:free
    timeout-seconds: 30

scraper:
  gupy:
    base-url: https://portal.api.gupy.io
    keywords: desenvolvedor,developer,estagiário,engenheiro de software
    exclude-keywords: sênior,senior,sr.,pleno,pl.,especialista,lead,coordenador
    locations: Ponta Grossa,Paraná,PR
    limit: 20
    timeout-seconds: 5

scheduler:
  fetch-jobs:
    cron: "0 0 */6 * * *"
