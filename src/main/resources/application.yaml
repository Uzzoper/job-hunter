spring:
  application:
    name: job-hunter

  datasource:
    url: jdbc:postgresql://localhost:5433/jobhunter
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

ai:
  openrouter:
    base-url: https://openrouter.ai/api/v1
    api-key: ${OPENROUTER_API_KEY}
    model: minimax/minimax-m2.5:free
    timeout-seconds: 30

scraper:
  gupy:
    base-url: https://portal.api.gupy.io
    keywords: desenvolvedor,developer,engenheiro de software,software engineer,fullstack,full stack,backend,front-end,frontend,ti,tecnologia
    exclude-keywords: sênior,senior,sr,sr.,pleno,pl.,especialista,lead,coordenador,manager
    locations: Ponta Grossa,Paraná,PR
    limit: 100
    timeout-seconds: 10
  infojobs:
    enabled: true
    base-url: https://www.infojobs.com.br
    keywords: desenvolvedor junior,desenvolvedor júnior,analista desenvolvedor junior,programador junior,java junior,backend junior
    exclude-keywords: senior,sênior,sr,sr.,pleno,pl.,lead,especialista,bdr,desenvolvedor de negócios,desenvolvimento de negócios,business development
    locations: Remoto,Home office,Todo Brasil,Ponta Grossa,Paraná,PR,Curitiba
    max-pages: 1
    max-age-days: 30
    timeout-seconds: 10
    delay-millis: 2000

scheduler:
  fetch-jobs:
    cron: "0 0 */6 * * *"
